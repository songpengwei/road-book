<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>路书 · Road Book</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1>路书 <span class="sub">Road Book</span></h1>
    <nav>
      <span class="muted">地图高亮 · 时间线编排 · 海报导出</span>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-card">
        <div class="section-title">Create</div>
        <h2>把地图、行程和图例编成一张路书。</h2>
        <p>先选县、市、省，再把每天的地点、交通和住宿写进时间线，最后一键导出成海报式路线图。</p>
      </div>
      <div class="hero-note">
        <div class="section-title">Flow</div>
        <p>1. 搜索行政区并加入路线范围</p>
        <p>2. 给每天录入交通、行程、住宿</p>
        <p>3. 为景点选择分类图标和所在地区</p>
        <p>4. 在导出页生成与参考图相近的成品图</p>
      </div>
    </section>

    <h2 class="section-title">新建路书</h2>
    <form class="new-trip-form" id="newForm">
      <input type="text" id="newName" placeholder="例如：辽蒙访古十日" required>
      <button type="submit" class="primary">开始编辑</button>
    </form>

    <h2 class="section-title">我的路书</h2>
    <ul class="trip-list" id="tripList"></ul>
    <div class="empty" id="emptyHint" style="display:none">还没有路书，先建一本。</div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/static/roadbook.js"></script>
  <script>
    const { $, api, escapeHtml, toast } = RoadBook;

    function fmtDate(s) {
      return new Date(s).toLocaleString("zh-CN", { hour12: false });
    }

    async function load() {
      const trips = await api("/api/trips");
      const list = $("#tripList");
      list.innerHTML = "";
      $("#emptyHint").style.display = trips.length ? "none" : "block";
      trips.forEach((trip) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div>
            <div class="name">${escapeHtml(trip.name)}</div>
            <div class="meta">
              ${trip.regions.length} 个区划 · ${trip.itinerary.length} 个行程日 · 更新于 ${fmtDate(trip.updated_at)}
            </div>
          </div>
          <div class="actions">
            <a class="btn" href="/edit?id=${trip.id}">编辑</a>
            <a class="btn primary" href="/export?id=${trip.id}">生成路书</a>
            <button class="danger" data-id="${trip.id}">删除</button>
          </div>
        `;
        list.appendChild(li);
      });
      list.querySelectorAll("[data-id]").forEach((btn) => {
        btn.onclick = async () => {
          if (!confirm("删除这本路书？")) return;
          await api(`/api/trips/${btn.dataset.id}`, { method: "DELETE" });
          toast("已删除");
          load();
        };
      });
    }

    $("#newForm").onsubmit = async (e) => {
      e.preventDefault();
      const name = $("#newName").value.trim();
      if (!name) return;
      const trip = await api("/api/trips", {
        method: "POST",
        body: JSON.stringify({ name }),
      });
      location.href = `/edit?id=${trip.id}`;
    };

    load();
  </script>
</body>
</html>
