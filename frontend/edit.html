<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编辑路书 · Road Book</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <h1><a href="/">路书</a> <span class="sub" id="tripName">加载中…</span></h1>
    <nav>
      <a href="/" class="muted">返回</a>
      <a href="#" id="exportLink" class="btn primary">生成路书</a>
    </nav>
  </header>

  <main class="editor-layout">
    <section class="editor-sidebar">
      <div class="sidebar-card">
        <h2>路书信息</h2>
        <div class="field-grid single">
          <input id="nameInput" placeholder="路书标题">
          <textarea id="descInput" placeholder="写一句导语，导出页会放在标题下方。"></textarea>
        </div>
      </div>

      <div class="sidebar-card">
        <h2>路线范围</h2>
        <div class="hint">支持省 / 地级市 / 县区搜索。加入后会以虚线边界高亮显示。</div>
        <div class="field-grid single">
          <input id="regionKeyword" placeholder="搜索：辽阳、义县、内蒙古…">
        </div>
        <div class="search-results" id="regionResults"></div>
        <div class="region-chips" id="regionChips"></div>
      </div>

      <div class="sidebar-card">
        <div class="day-head">
          <strong>时间线</strong>
          <button id="addDayBtn">新增一天</button>
        </div>
        <div class="hint">每一天可录入时间、交通、住宿，再为行程地点选择地区和图例类别。</div>
        <div class="day-list" id="dayList"></div>
      </div>

      <div class="sidebar-card">
        <div class="inline-actions">
          <button id="saveBtn" class="primary">保存</button>
          <a class="btn" id="previewBtn" href="#">查看成品页</a>
        </div>
      </div>
    </section>

    <section class="preview-stack">
      <div class="preview-card">
        <div class="summary-bar">
          <div>
            <div class="section-title">地图预览</div>
            <div class="hint">虚线为选中行政区，红色点线取自行程地点。</div>
          </div>
          <div class="legend" id="legend"></div>
        </div>
        <div class="map-preview" id="mapPreview"></div>
      </div>
      <div class="preview-card">
        <div class="section-title">导出说明</div>
        <div class="hint">成品页会按参考图生成：上方地图与图例，下方时间线表格，点击“生成路书”直接下载 PNG。</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="/static/roadbook.js"></script>
  <script src="/static/edit.js"></script>
</body>
</html>
