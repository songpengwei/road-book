<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生成路书 · Road Book</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="poster-page">
    <div class="poster-tools">
      <div>
        <a href="/" class="btn">返回列表</a>
        <a href="#" id="editLink" class="btn">继续编辑</a>
      </div>
      <button id="downloadBtn" class="primary">生成路书</button>
    </div>

    <div class="poster-shell">
      <div class="poster" id="poster">
        <div class="poster-head">
          <div>
            <h1 class="poster-title">地图｜<span id="posterTitle">加载中…</span></h1>
            <div class="poster-subtitle" id="posterSubtitle"></div>
          </div>
          <div class="poster-stamp">路书<br>ROAD</div>
        </div>

        <div class="poster-map-wrap">
          <div class="poster-legend" id="posterLegend"></div>
          <div class="poster-map" id="posterMap"></div>
        </div>

        <div class="poster-table">
          <div class="poster-table-head">
            <div>时间</div>
            <div>坐标</div>
            <div>参观</div>
            <div>住宿</div>
          </div>
          <div id="posterRows"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="/static/roadbook.js"></script>
  <script src="/static/export.js"></script>
</body>
</html>
